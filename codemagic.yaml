workflows:
  ios-release:
    name: iOS Release Build & Publish
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - apple_credentials
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install

      - name: Build web app
        script: |
          cd frontend
          npm run build

      - name: Capacitor Sync
        script: |
          cd frontend
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd frontend/ios/App
          pod install --repo-update

      - name: Set up code signing (Tự động qua API Key)
        script: |
          set -ex  # Dừng ngay nếu có lệnh lỗi và in ra lệnh đang chạy
          echo "=== Khởi tạo Keychain ==="
          keychain initialize

          echo "=== Fetch Signing Files ==="
          # Thêm -v để in log chi tiết
          app-store-connect fetch-signing-files "$APP_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --type IOS_APP_STORE \
            --create -v

          echo "=== Nạp chứng chỉ ==="
          keychain add-certificates -v

          echo "=== Áp dụng Profile ==="
          xcode-project use-profiles -v


      - name: Build IPA
        script: |
          set -ex
          # Chạy build với biến môi trường trực tiếp ép cấu hình signing
          export DEVELOPMENT_TEAM="6G2HP2S64D"
          export CODE_SIGN_IDENTITY="Apple Distribution"
          export CODE_SIGN_STYLE="Manual"

          xcode-project build-ipa \
            --workspace "frontend/ios/App/App.xcworkspace" \
            --scheme "App" \
            --archive-flags="-xcconfig $PWD/build.xcconfig" || (
              # Nếu lỗi do flags, thử chạy không flags
              echo "Lỗi archive với flags, thử lại mặc định..."
              xcode-project build-ipa \
                --workspace "frontend/ios/App/App.xcworkspace" \
                --scheme "App"
            )

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
