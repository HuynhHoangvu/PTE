workflows:
  ios-release:
    name: iOS Release Build & Publish
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - apple_credentials
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install

      - name: Build web app
        script: |
          cd frontend
          npm run build

      - name: Capacitor Sync
        script: |
          cd frontend
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd frontend/ios/App
          pod install --repo-update

      - name: Set up code signing (Tự động qua API Key)
        script: |
          set -ex
          echo "=== Khởi tạo Keychain ==="
          keychain initialize

          echo "=== Fetch Signing Files ==="
          app-store-connect fetch-signing-files "$APP_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --type IOS_APP_STORE \
            --create -v

          echo "=== Nạp chứng chỉ ==="
          keychain add-certificates -v

          echo "=== Áp dụng Profile ==="
          # CHỈ ĐỊNH ĐÚNG ĐƯỜNG DẪN PROJECT VÌ ĐÂY LÀ CAPACITOR
          xcode-project use-profiles --project "frontend/ios/App/App.xcodeproj" -v


      - name: Build IPA
        script: |
          set -ex
          # Sử dụng xcodebuild thay cho build-ipa wrapper nếu wrapper lỗi
          xcode-project build-ipa \
            --workspace "frontend/ios/App/App.xcworkspace" \
            --scheme "App" \
            || {
              echo "build-ipa thất bại, thử build thuần túy..."
              xcodebuild archive \
                -workspace "frontend/ios/App/App.xcworkspace" \
                -scheme "App" \
                -archivePath "build/ios/xcarchive/App.xcarchive" \
                CODE_SIGN_STYLE=Manual \
                COMPILER_INDEX_STORE_ENABLE=NO
            }

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
