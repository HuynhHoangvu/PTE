workflows:
  ios-release:
    name: iOS Release Build & Publish
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - apple_credentials
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install

      - name: Build web app
        script: |
          cd frontend
          npm run build

      - name: Capacitor Sync
        script: |
          cd frontend
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd frontend/ios/App
          pod install --repo-update

      - name: Set up code signing (Manual via OpenSSL + API)
        script: |
          echo "=== 1. Khởi tạo Keychain ==="
          keychain initialize
          KEYCHAIN=$(ls ~/Library/codemagic-cli-tools/keychains/*.keychain-db 2>/dev/null | head -1)
          echo "Keychain: $KEYCHAIN"

          echo "=== 2. Sinh Private Key + CSR bằng OpenSSL ==="
          openssl genrsa -out /tmp/ios_key.pem 2048
          echo "Key size: $(wc -c < /tmp/ios_key.pem)"

          openssl req -new -key /tmp/ios_key.pem -out /tmp/ios.csr \
            -subj "/CN=Apple Distribution/C=VN"
          echo "CSR size: $(wc -c < /tmp/ios.csr)"

          CSR_BASE64=$(base64 /tmp/ios.csr | tr -d '\n')
          echo "CSR Base64 length: ${#CSR_BASE64}"

          echo "=== 3. Tạo Certificate trên Apple bằng API ==="
          app-store-connect certificates create \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --type IOS_DISTRIBUTION \
            --certificate-content "$CSR_BASE64" \
            --save \
            && echo "✅ Tạo cert thành công!" \
            || { echo "❌ Tạo cert thất bại! Thử tiếp..."; }

          echo "=== 4. Tìm file cert đã lưu ==="
          CERT_FILE=$(find ~ -name "*.cer" -newer /tmp/ios.csr 2>/dev/null | head -1)
          echo "Cert file tìm được: $CERT_FILE"

          if [ -z "$CERT_FILE" ]; then
            echo "Không tìm thấy .cer file mới, tìm toàn bộ..."
            find ~ -name "*.cer" 2>/dev/null | head -5
            exit 1
          fi

          echo "=== 5. Tạo P12 từ Key + Cert ==="
          openssl x509 -in "$CERT_FILE" -inform DER -out /tmp/ios_cert.pem \
            && echo "✅ Convert DER→PEM OK" \
            || { echo "❌ Convert thất bại!"; exit 1; }

          openssl pkcs12 -export \
            -inkey /tmp/ios_key.pem \
            -in /tmp/ios_cert.pem \
            -out /tmp/ios_dist.p12 \
            -passout pass:codemagic123 \
            && echo "✅ Tạo P12 OK (size: $(wc -c < /tmp/ios_dist.p12))" \
            || { echo "❌ Tạo P12 thất bại!"; exit 1; }

          echo "=== 6. Import P12 vào Keychain ==="
          security import /tmp/ios_dist.p12 \
            -k "$KEYCHAIN" \
            -P "codemagic123" \
            -A \
            -T /usr/bin/codesign \
            && echo "✅ Import OK!" \
            || { echo "❌ Import thất bại!"; exit 1; }

          echo "=== 7. Kiểm tra chứng chỉ ==="
          security find-identity -v -p codesigning "$KEYCHAIN"

          echo "=== 8. Tạo Provisioning Profile ==="
          app-store-connect fetch-signing-files "$APP_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --type IOS_APP_STORE \
            --create \
            && echo "✅ Profile OK!" \
            || { echo "❌ Profile thất bại!"; exit 1; }

          keychain add-certificates

          echo "=== 9. Áp dụng Profile vào Xcode ==="
          xcode-project use-profiles \
            && echo "✅ use-profiles OK!" \
            || { echo "❌ use-profiles thất bại!"; exit 1; }


      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "frontend/ios/App/App.xcworkspace" \
            --scheme "App"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
