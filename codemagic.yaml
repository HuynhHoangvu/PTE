workflows:
  ios-release:
    name: iOS Release Build & Publish
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - apple_credentials
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install

      - name: Build web app
        script: |
          cd frontend
          npm run build

      - name: Capacitor Sync
        script: |
          cd frontend
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd frontend/ios/App
          pod install --repo-update

      - name: Set up code signing (Manual via OpenSSL + API)
        script: |
          echo "=== 1. Khởi tạo Keychain ==="
          keychain initialize
          KEYCHAIN=$(ls ~/Library/codemagic-cli-tools/keychains/*.keychain-db 2>/dev/null | head -1)
          echo "Keychain: $KEYCHAIN"

          echo "=== 2. Sinh Private Key ==="
          openssl genrsa -out /tmp/ios_key.pem 2048
          echo "Key OK: $(wc -c < /tmp/ios_key.pem) bytes"

          echo "=== 3. Tạo Certificate qua API (tool tự sinh CSR) ==="
          # Dùng @file: prefix theo cú pháp của Codemagic CLI
          app-store-connect certificates create \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --type IOS_DISTRIBUTION \
            --certificate-key "@file:/tmp/ios_key.pem" \
            --p12-password "codemagic123" \
            --p12-path /tmp/ios_dist.p12 \
            --save \
            && echo "✅ Certificate tạo thành công!" \
            || { echo "❌ Certificate thất bại!"; exit 1; }

          echo "P12 size: $(wc -c < /tmp/ios_dist.p12 2>/dev/null || echo 'không tìm thấy')"

          echo "=== 4. Import P12 vào Keychain ==="
          security import /tmp/ios_dist.p12 \
            -k "$KEYCHAIN" \
            -P "codemagic123" \
            -A \
            -T /usr/bin/codesign \
            && echo "✅ Import OK!" \
            || { echo "❌ Import thất bại!"; exit 1; }

          echo "=== 5. Kiểm tra chứng chỉ ==="
          security find-identity -v -p codesigning "$KEYCHAIN"

          echo "=== 6. Tạo Provisioning Profile ==="
          app-store-connect fetch-signing-files "$APP_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --type IOS_APP_STORE \
            --create \
            && echo "✅ Profile OK!" \
            || { echo "❌ Profile thất bại!"; exit 1; }

          keychain add-certificates

          echo "=== 7. Áp dụng vào Xcode ==="
          xcode-project use-profiles && echo "✅ Done!"


      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "frontend/ios/App/App.xcworkspace" \
            --scheme "App"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
