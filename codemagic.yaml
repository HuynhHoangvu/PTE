workflows:
  ios-release:
    name: iOS Release Build & Publish
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - apple_credentials
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install
      - name: Build web app
        script: |
          cd frontend
          npm run build
      - name: Capacitor Sync
        script: |
          cd frontend
          npx cap sync ios
      - name: Set up code signing (Ký chứng chỉ Apple)
        script: |
          # Khởi tạo keychain
          keychain initialize

          # Giải mã chứng chỉ .p12
          mkdir -p ~/Library/MobileDevice/Certificates
          echo "$CM_CERTIFICATE" | base64 --decode > ~/Library/MobileDevice/Certificates/ios_distribution.p12

          # Giải mã Provisioning Profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Fly_PTE_App_Store_Profile.mobileprovision

          # Nạp chứng chỉ vào keychain với mật khẩu là 123456
          keychain add-certificates --password "123456"

          # Áp dụng Provisioning Profile vào Xcode Project
          xcode-project use-profiles
      - name: Install CocoaPods dependencies (Bắt buộc cho iOS)
        script: |
          cd frontend/ios/App
          pod install --repo-update
      - name: Build IPA (File cài đặt iOS)
        script: |
          xcode-project build-ipa \
            --workspace "frontend/ios/App/App.xcworkspace" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        # Sử dụng API Key của tài khoản để upload trực tiếp lên TestFlight
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        # Tự động gửi duyệt nếu muốn (mặc định là false để test trước qua TestFlight)
        submit_to_app_store: false
