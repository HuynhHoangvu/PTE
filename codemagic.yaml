workflows:
  ios-release:
    name: iOS Release Build & Publish
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        # Định nghĩa nhóm biến môi trường trên giao diện Codemagic:
        # Gồm: APP_STORE_CONNECT_PRIVATE_KEY, APP_STORE_CONNECT_KEY_IDENTIFIER, APP_STORE_CONNECT_ISSUER_ID, APP_ID
        - apple_credentials
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    signing:
      # Sử dụng tính năng ký tự động tích hợp của Codemagic thông qua Integrations
      app_store_connect:
        auth: integration
        type: app_store
        bundle_identifier: com.flyedu.pte
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install
      - name: Build web app
        script: |
          cd frontend
          npm run build
      - name: Capacitor Sync
        script: |
          cd frontend
          npx cap sync ios
      - name: Build IPA (File cài đặt iOS)
        script: |
          xcode-project build-ipa \
            --workspace "frontend/ios/App/App.xcworkspace" \
            --scheme "App" \
            --configuration "Release"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        # Sử dụng tài khoản App Store Connect đã liên kết trong Integrations
        auth: integration
        submit_to_testflight: true
        # Tự động gửi duyệt nếu muốn (mặc định là false để test trước qua TestFlight)
        submit_to_app_store: false
