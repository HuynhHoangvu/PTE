workflows:
  ios-release:
    name: iOS Release Build & Publish
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - apple_credentials
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install
      - name: Build web app
        script: |
          cd frontend
          npm run build
      - name: Capacitor Sync
        script: |
          cd frontend
          npx cap sync ios
      - name: Set up code signing (Ký chứng chỉ Apple)
        script: |
          # Bước 1: Khởi tạo keychain của Codemagic
          keychain initialize

          # Bước 2: Lấy đường dẫn keychain vừa tạo
          KEYCHAIN_DB=$(ls ~/Library/codemagic-cli-tools/keychains/*.keychain-db 2>/dev/null | head -1)
          echo "📍 Keychain path: $KEYCHAIN_DB"

          # Bước 3: Giải mã p12 ra file tạm
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          echo "📦 P12 size: $(wc -c < /tmp/cert.p12) bytes"

          # Bước 4: Import chứng chỉ vào keychain bằng lệnh security
          security import /tmp/cert.p12 \
            -k "$KEYCHAIN_DB" \
            -P "123456" \
            -A \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            && echo "✅ Import chứng chỉ thành công!" \
            || echo "❌ Import chứng chỉ thất bại!"

          # Bước 5: Kiểm tra chứng chỉ đã vào keychain chưa
          echo "🔍 Danh sách chứng chỉ trong keychain:"
          security find-identity -v -p codesigning "$KEYCHAIN_DB"

          # Bước 6: Cài đặt Provisioning Profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Fly_PTE_App_Store_Profile.mobileprovision
          echo "✅ Provisioning Profile đã cài đặt!"

          # Bước 7: Áp dụng Profile vào Xcode Project
          xcode-project use-profiles
      - name: Chẩn đoán môi trường và Build IPA
        script: |
          echo "=============================="
          echo "📋 KIỂM TRA MÔI TRƯỜNG"
          echo "=============================="
          echo "Xcode version: $(xcodebuild -version)"
          echo "CocoaPods version: $(pod --version)"
          echo "Node version: $(node -v)"
          echo "Ruby version: $(ruby -v)"
          echo ""

          echo "=============================="
          echo "📁 KIỂM TRA CẤU TRÚC THƯ MỤC"
          echo "=============================="
          ls -la frontend/ios/App/
          echo ""

          echo "=============================="
          echo "📦 CHẠY POD INSTALL"
          echo "=============================="
          cd frontend/ios/App
          pod install --repo-update
          echo "Pod install kết thúc, trạng thái: $?"
          echo ""
          cd /Users/builder/clone

          echo "=============================="
          echo "🔐 KIỂM TRA CHỨNG CHỈ & PROFILE"
          echo "=============================="
          security find-identity -v -p codesigning || echo "Không tìm thấy chứng chỉ nào"
          echo ""
          ls ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "Không có Provisioning Profile nào"
          echo ""

          echo "=============================="
          echo "🔧 KIỂM TRA CẤU HÌNH XCODE"
          echo "=============================="
          xcodebuild \
            -workspace "frontend/ios/App/App.xcworkspace" \
            -scheme "App" \
            -showBuildSettings 2>&1 | grep -E "(PRODUCT_BUNDLE_IDENTIFIER|CODE_SIGN|PROVISIONING_PROFILE|DEVELOPMENT_TEAM|CONFIGURATION)"
          echo ""

          echo "=============================="
          echo "🚀 BẮT ĐẦU BUILD ARCHIVE (VERBOSE)"
          echo "=============================="
          xcodebuild \
            -workspace "frontend/ios/App/App.xcworkspace" \
            -scheme "App" \
            -archivePath /Users/builder/clone/build/ios/xcarchive/App.xcarchive \
            -destination "generic/platform=iOS" \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee /tmp/xcode_full_log.txt | grep -E "(error:|warning: .*error|Build succeeded|FAILED|Failed|Signing|CodeSign|fatal)" || true

          BUILD_STATUS=${PIPESTATUS[0]}
          echo ""
          echo "=============================="
          if [ $BUILD_STATUS -eq 0 ]; then
            echo "✅ ARCHIVE THÀNH CÔNG! Đang export IPA..."
            echo "=============================="
            xcode-project build-ipa \
              --workspace "frontend/ios/App/App.xcworkspace" \
              --scheme "App"
          else
            echo "❌ ARCHIVE THẤT BẠI! (Status: $BUILD_STATUS)"
            echo "=============================="
            echo ""
            echo "📌 CÁC LỖI QUAN TRỌNG:"
            grep -n "error:" /tmp/xcode_full_log.txt | head -30 || echo "(Không tìm thấy dòng lỗi cụ thể)"
            exit $BUILD_STATUS
          fi
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        # Sử dụng API Key của tài khoản để upload trực tiếp lên TestFlight
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        # Tự động gửi duyệt nếu muốn (mặc định là false để test trước qua TestFlight)
        submit_to_app_store: false
