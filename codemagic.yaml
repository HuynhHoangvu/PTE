workflows:
  ios-release:
    name: iOS Release Build & Publish
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - apple_credentials
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install

      - name: Build web app
        script: |
          cd frontend
          npm run build

      - name: Capacitor Sync
        script: |
          cd frontend
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd frontend/ios/App
          pod install --repo-update

      - name: Set up code signing (Tự động qua API Key)
        script: |
          echo "--- Kiểm tra biến môi trường ---"
          echo "APP_ID: $APP_ID"
          echo "ISSUER_ID length: ${#APP_STORE_CONNECT_ISSUER_ID}"
          echo "KEY_ID: $APP_STORE_CONNECT_KEY_IDENTIFIER"
          echo "PRIVATE_KEY length: ${#APP_STORE_CONNECT_PRIVATE_KEY}"
          echo "PRIVATE_KEY 3 dòng đầu:"
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" | head -3
          echo "---"

          # Khởi tạo keychain
          keychain initialize

          # Gọi lệnh fetch-signing-files và in ra lỗi nếu thất bại
          app-store-connect fetch-signing-files "$APP_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --type IOS_APP_STORE \
            --create \
            && echo "✅ fetch-signing-files thành công!" \
            || { echo "❌ fetch-signing-files thất bại!"; exit 1; }

          # Nạp cert vào keychain
          keychain add-certificates

          # Kiểm tra chứng chỉ
          echo "🔍 Chứng chỉ trong keychain:"
          security find-identity -v -p codesigning

          # Áp dụng profile vào Xcode
          xcode-project use-profiles \
            && echo "✅ Profiles đã được áp dụng!" \
            || { echo "❌ use-profiles thất bại!"; exit 1; }

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "frontend/ios/App/App.xcworkspace" \
            --scheme "App"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
