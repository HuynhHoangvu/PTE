workflows:
  ios-release:
    name: iOS Release Build & Publish
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - apple_credentials
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install

      - name: Build web app
        script: |
          cd frontend
          npm run build

      - name: Capacitor Sync
        script: |
          cd frontend
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd frontend/ios/App
          pod install --repo-update

      - name: Build & Sign IPA (Native Xcode Automatic Signing)
        script: |
          set -ex
          mkdir -p build/ios/xcarchive build/ios/ipa
          
          echo "=== 1. Tạo file P8 cho Apple API Key ==="
          AUTH_KEY_PATH="/tmp/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > "$AUTH_KEY_PATH"
          chmod 600 "$AUTH_KEY_PATH"

          echo "=== 2. Ép Project dùng Automatic Signing ==="
          cd frontend/ios/App
          # Chuyển tất cả Manual thành Automatic trong file thiết lập của Xcode
          sed -i '' 's/CODE_SIGN_STYLE = Manual;/CODE_SIGN_STYLE = Automatic;/g' App.xcodeproj/project.pbxproj
          
          echo "=== 3. Tạo file cấu hình Export ==="
          cat <<EOF > ../../../build/ios/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>6G2HP2S64D</string>
              <key>signingStyle</key>
              <string>automatic</string>
          </dict>
          </plist>
          EOF

          echo "=== 4. Đóng gói Archive (Xcode tự động lo chứng chỉ) ==="
          xcodebuild archive \
            -workspace "App.xcworkspace" \
            -scheme "App" \
            -archivePath "../../../build/ios/xcarchive/App.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$AUTH_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            DEVELOPMENT_TEAM="6G2HP2S64D" \
            "CODE_SIGN_IDENTITY=Apple Distribution"

          echo "=== 5. Xuất file IPA ==="
          xcodebuild -exportArchive \
            -archivePath "../../../build/ios/xcarchive/App.xcarchive" \
            -exportPath "../../../build/ios/ipa" \
            -exportOptionsPlist "../../../build/ios/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$AUTH_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

          echo "✅ Build IPA thành công!"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
