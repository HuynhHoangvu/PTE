workflows:
  ios-release:
    name: iOS Release Build & Publish
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        # Định nghĩa nhóm biến môi trường trên giao diện Codemagic:
        # Gồm: APP_STORE_CONNECT_PRIVATE_KEY, APP_STORE_CONNECT_KEY_IDENTIFIER, APP_STORE_CONNECT_ISSUER_ID, APP_ID
        - apple_credentials
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install
      - name: Build web app
        script: |
          cd frontend
          npm run build
      - name: Capacitor Sync
        script: |
          cd frontend
          npx cap sync ios
      - name: Set up code signing (Chứng chỉ Apple)
        script: |
          # Kiểm tra xem các biến môi trường có bị trống hay không
          if [ -z "$APP_STORE_CONNECT_ISSUER_ID" ] || [ -z "$APP_STORE_CONNECT_KEY_IDENTIFIER" ] || [ -z "$APP_STORE_CONNECT_PRIVATE_KEY" ] || [ -z "$APP_ID" ]; then
            echo "❌ LỖI: Một hoặc nhiều biến môi trường trong nhóm 'apple_credentials' đang bị trống!"
            echo "Hãy đảm bảo bạn đã tạo nhóm biến tên là 'apple_credentials' trên Codemagic và thêm đủ 4 biến sau:"
            echo "1. APP_ID (ví dụ: com.flyedu.pte)"
            echo "2. APP_STORE_CONNECT_ISSUER_ID"
            echo "3. APP_STORE_CONNECT_KEY_IDENTIFIER"
            echo "4. APP_STORE_CONNECT_PRIVATE_KEY"
            exit 1
          fi

          keychain initialize
          # Tự động tải chứng chỉ và provisioning profile từ Apple Developer Portal
          app-store-connect fetch-signing-files "$APP_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --create
          keychain add-certificates
      - name: Set up code signing settings in Xcode project
        script: |
          xcode-project use-profiles
      - name: Build IPA (File cài đặt iOS)
        script: |
          xcode-project build-ipa \
            --workspace "frontend/ios/App/App.xcworkspace" \
            --scheme "App" \
            --configuration "Release"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        # Cấu hình tự động đẩy lên TestFlight của Apple
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        # Tự động gửi duyệt nếu muốn (mặc định là false để test trước qua TestFlight)
        submit_to_app_store: false
