workflows:
  ios-release:
    name: iOS Release Build & Publish
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - apple_credentials
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install

      - name: Build web app
        script: |
          cd frontend
          npm run build

      - name: Capacitor Sync
        script: |
          cd frontend
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd frontend/ios/App
          pod install --repo-update

      - name: Set up code signing (Manual via OpenSSL + API)
        script: |
          echo "=== 1. Khởi tạo Keychain ==="
          keychain initialize
          KEYCHAIN=$(ls ~/Library/codemagic-cli-tools/keychains/*.keychain-db 2>/dev/null | head -1)
          echo "Keychain: $KEYCHAIN"

          echo "=== 2. Sinh Private Key + CSR ==="
          openssl genrsa -out /tmp/ios_key.pem 2048
          openssl req -new -key /tmp/ios_key.pem -out /tmp/ios.csr \
            -subj "/CN=Apple Distribution/C=VN"
          echo "Key OK: $(wc -c < /tmp/ios_key.pem) bytes"
          echo "CSR OK: $(wc -c < /tmp/ios.csr) bytes"

          # Dùng cat | base64 thay vì base64 filepath (macOS không hỗ trợ)
          CSR_BASE64=$(cat /tmp/ios.csr | base64 | tr -d '\n')
          echo "CSR Base64 length: ${#CSR_BASE64}"

          echo "=== 3. Xem help của certificates create ==="
          app-store-connect certificates create --help 2>&1 || true

          echo ""
          echo "=== 4. Thử tạo Certificate (dùng --csr) ==="
          app-store-connect certificates create \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --type IOS_DISTRIBUTION \
            --csr /tmp/ios.csr \
            --save \
            && echo "✅ Cert tạo thành công (--csr)!" \
            || echo "❌ Thất bại với --csr, thử cách khác..."

          echo ""
          echo "=== 5. Tìm file cert ==="
          find ~ -name "*.cer" -newer /tmp/ios_key.pem 2>/dev/null | head -10 || echo "Không tìm thấy .cer"
          CERT_FILE=$(find ~ -name "*.cer" -newer /tmp/ios_key.pem 2>/dev/null | head -1)

          if [ -z "$CERT_FILE" ]; then
            echo "Không có .cer → thoát để xem log"
            exit 1
          fi

          echo "=== 6. Tạo P12 ==="
          openssl x509 -in "$CERT_FILE" -inform DER -out /tmp/ios_cert.pem
          openssl pkcs12 -export \
            -inkey /tmp/ios_key.pem \
            -in /tmp/ios_cert.pem \
            -out /tmp/ios_dist.p12 \
            -passout pass:codemagic123
          echo "P12 size: $(wc -c < /tmp/ios_dist.p12)"

          echo "=== 7. Import vào Keychain ==="
          security import /tmp/ios_dist.p12 \
            -k "$KEYCHAIN" -P "codemagic123" -A -T /usr/bin/codesign \
            && echo "✅ Import OK!"

          echo "=== 8. Kiểm tra ==="
          security find-identity -v -p codesigning "$KEYCHAIN"

          echo "=== 9. Tạo Provisioning Profile ==="
          app-store-connect fetch-signing-files "$APP_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --type IOS_APP_STORE \
            --create \
            && echo "✅ Profile OK!" \
            || { echo "❌ Profile thất bại!"; exit 1; }

          keychain add-certificates

          echo "=== 10. Áp dụng vào Xcode ==="
          xcode-project use-profiles && echo "✅ Done!"

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "frontend/ios/App/App.xcworkspace" \
            --scheme "App"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
